    lg: |
      Hi there! I’m a problem solver at heart. Whether in software development or on a climbing wall, I enjoy analyzing challenges, designing solutions, and refining them through iteration. <br>
      In bouldering, routes are called “problems” - a perfect parallel to programming (isn't it?), where success comes from strategy, persistence, and precision.
